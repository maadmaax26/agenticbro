<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGENTICBRO - Your AI Degen Advisor</title>
    <meta name="description" content="AI-powered portfolio roasting for Solana degens. Connect your wallet and let AIBRO analyze your trading behavior." />
    <style>
      body { margin: 0; background-color: #020817; color: #ffffff; font-family: sans-serif; }
      #splash { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #020817; z-index: 9999; gap: 20px; }
      #splash-logo { font-size: 2rem; font-weight: 700; color: #ffffff; }
      #splash-logo span { color: #22d3ee; }
      .splash-spinner { width: 40px; height: 40px; border: 3px solid rgba(34,211,238,0.2); border-top-color: #22d3ee; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-logo">Agentic <span>Bro</span></div>
      <div class="splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function() {
        var s = document.getElementById('splash');
        if (s) { setTimeout(function() { s.style.opacity='0'; s.style.transition='opacity 0.3s'; setTimeout(function(){s.remove();},300); }, 100); }
      });
    </script>
  </body>
</html>
