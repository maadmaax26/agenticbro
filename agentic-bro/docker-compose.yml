version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agentic-bro-db
    environment:
      POSTGRES_USER: ${DB_USER:-agenticbro}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agenticbro_secret}
      POSTGRES_DB: ${DB_NAME:-agenticbro}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agenticbro} -d ${DB_NAME:-agenticbro}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentic-bro-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: agentic-bro-cache
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentic-bro-network
    restart: unless-stopped

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-bro-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3002}
      DATABASE_URL: postgresql://${DB_USER:-agenticbro}:${DB_PASSWORD:-agenticbro_secret}@postgres:5432/${DB_NAME:-agenticbro}
      REDIS_URL: redis://redis:6379
      TWITTER_API_KEY: ${TWITTER_API_KEY}
      TWITTER_API_SECRET: ${TWITTER_API_SECRET}
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN}
      BOTOMETER_API_KEY: ${BOTOMETER_API_KEY}
      GOPUS_API_KEY: ${GOPUS_API_KEY}
      DEXSCREENER_API_KEY: ${DEXSCREENER_API_KEY}
      RUGCHECK_API_KEY: ${RUGCHECK_API_KEY}
      DEEPFAKE_MODEL_PATH: /app/models/deepfake.onnx
    ports:
      - "${API_PORT:-3002}:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentic-bro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Background Worker (for async processing)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: agentic-bro-worker
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER:-agenticbro}:${DB_PASSWORD:-agenticbro_secret}@postgres:5432/${DB_NAME:-agenticbro}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentic-bro-network
    restart: unless-stopped

networks:
  agentic-bro-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local