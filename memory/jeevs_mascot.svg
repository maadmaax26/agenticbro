<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e5e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Circle Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Robot Head -->
  <rect x="156" y="100" width="200" height="160" rx="30" fill="url(#bodyGradient)" stroke="#16a34a" stroke-width="4"/>
  
  <!-- Visor -->
  <rect x="176" y="130" width="160" height="40" rx="10" fill="#16a34a"/>
  <rect x="186" y="140" width="140" height="20" rx="5" fill="#22c55e" opacity="0.8"/>
  
  <!-- Scanning Line -->
  <line x1="186" y1="150" x2="326" y2="150" stroke="#fff" stroke-width="3" opacity="0.9">
    <animate attributeName="x1" values="186;326;186" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="326;186;326" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Antenna -->
  <line x1="256" y1="100" x2="256" y2="70" stroke="#16a34a" stroke-width="4"/>
  <circle cx="256" cy="65" r="8" fill="#16a34a"/>
  
  <!-- Body -->
  <rect x="176" y="270" width="160" height="120" rx="20" fill="url(#bodyGradient)" stroke="#16a34a" stroke-width="4"/>
  
  <!-- Shield Emblem -->
  <path d="M256 300 L276 315 L276 340 L256 355 L236 340 L236 315 Z" fill="#16a34a"/>
  <path d="M256 308 L268 318 L268 335 L256 345 L244 335 L244 318 Z" fill="#22c55e"/>
  <text x="256" y="328" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">✓</text>
  
  <!-- Arms -->
  <rect x="116" y="280" width="50" height="80" rx="15" fill="url(#bodyGradient)" stroke="#16a34a" stroke-width="3"/>
  <rect x="346" y="280" width="50" height="80" rx="15" fill="url(#bodyGradient)" stroke="#16a34a" stroke-width="3"/>
  
  <!-- Base/Mac Studio Node -->
  <rect x="196" y="400" width="120" height="60" rx="8" fill="#e5e5e5" stroke="#16a34a" stroke-width="3"/>
  <rect x="206" y="410" width="100" height="8" rx="2" fill="#16a34a"/>
  <circle cx="266" cy="440" r="4" fill="#22c55e"/>
  
  <!-- Name Badge -->
  <rect x="196" y="460" width="120" height="30" rx="5" fill="#16a34a"/>
  <text x="256" y="480" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">JEEEVS</text>
  
  <!-- Tagline -->
  <text x="256" y="500" font-family="Arial, sans-serif" font-size="10" fill="#16a34a" text-anchor="middle">Scan first. Ape later. 🔐</text>
</svg>